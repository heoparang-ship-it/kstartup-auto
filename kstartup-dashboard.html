*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5;}
a{color:var(--fg);text-decoration:none;}

header{border-bottom:2px solid var(--line);padding:16px 20px 12px;}

.stat{padding:10px 8px;text-align:center;border-right:1px solid var(--line-soft);}
.stat:last-child{border-right:none;}
.stat-label{font-family:var(--mono);font-size:10px;color:var(--muted);display:block;}
.stat-val{font-size:20px;font-weight:700;display:block;}
.filters{padding:10px 20px;display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(--line-soft);}

.filter-btn:hover:not(.active){background:var(--hover);}
.grid{padding:0 20px 20px;}
.section-title{font-size:12px;font-weight:700;font-family:var(--mono);padding:12px 0 6px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--line-soft);margin-bottom:8px;}
.card{border:1px solid var(--line-soft);margin-bottom:6px;display:flex;position:relative;overflow:hidden;}

.tier-user .tier-marker{background:var(--c-violet);}
.card-body{flex:1;padding:8px 10px;min-width:0;}
.card-title{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:4px;}
.card-title a{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.badge{font-family:var(--mono);font-size:10px;padding:1px 5px;border:1px solid var(--line);}
.badge.solid{background:var(--fg);color:var(--bg);}
.badge.urgent{background:var(--fg);color:var(--bg);}
.b-g{color:var(--c-green);border-color:var(--c-green);}

.b-o{color:var(--c-orange);border-color:var(--c-orange);}

.b-violet{background:var(--c-violet);color:var(--bg);border-color:var(--c-violet);}
.card-agency{font-family:var(--mono);font-size:10px;color:var(--muted);}
.card-note{font-size:11px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-actions{display:flex;flex-direction:column;gap:3px;padding:8px 6px;flex-shrink:0;}
.action-btn{font-family:var(--mono);font-size:9px;padding:2px 6px;border:1px solid var(--line);background:var(--bg);cursor:pointer;white-space:nowrap;}
.action-btn:hover{background:var(--hover);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg);border:2px solid var(--line);padding:20px;width:500px;max-width:90vw;max-height:90vh;overflow-y:auto;}

footer{border-top:1px solid var(--line-soft);padding:10px 20px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--muted);}

function ls(){try{return JSON.parse(localStorage.getItem(SK))||{statuses:{},userItems:[]};}catch(e){return{statuses:{},userItems:[]};}}
function ss(s){localStorage.setItem(SK,JSON.stringify(s));}
function dn(d){if(!d)return null;const a=new Date(d+"T00:00:00+09:00"),b=new Date(TODAY+"T00:00:00+09:00");return Math.round((a-b)/86400000);}

let CF="all";
function setFilter(f,btn){CF=f;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");render();}

const SYM={green:"●",yellow:"◐",orange:"○",user:"◆"};
const LBL={green:"1순위",yellow:"2순위",orange:"AI",user:"내사업"};
const BCL={green:"b-g",yellow:"b-y",orange:"b-o",user:"b-violet"};

function card(item,st){
  const n=dn(item.deadline),isN=item.first_seen===TODAY,isU=n!==null&&n>=0&&n<=3,status=st?.status||"pool";
  let b=`<span class="badge ${BCL[item.tier]||"b-o"}">${SYM[item.tier]||"○"} ${LBL[item.tier]||item.tier}</span>`;
  if(item.deadline){const ds=n===null?"":n<0?"만료":`D-${n}`;b+=` <span class="badge${isU?" urgent":""}">${item.deadline} ${ds}</span>`;}
  if(isN)b+=' <span class="badge solid">NEW</span>';
  if(status==="in_progress")b+=' <span class="badge b-blue">▶ 진행중</span>';
  if(status==="completed")b+=' <span class="badge" style="border-color:var(--c-green);color:var(--c-green)">✓ 완료</span>';
  let acts="";
  if(status==="pool")acts=`<button class="action-btn" onclick="mv('${item.id}','in_progress',event)">▶ 진행중</button>`;
  else if(status==="in_progress")acts=`<button class="action-btn" onclick="mv('${item.id}','completed',event)">✓ 완료</button><button class="action-btn" onclick="mv('${item.id}','pool',event)">↶ 되돌리기</button>`;
  else if(status==="completed")acts=`<button class="action-btn" onclick="mv('${item.id}','in_progress',event)">↶ 진행중</button><button class="action-btn" onclick="delC('${item.id}',event)" style="color:var(--c-red)">🗑 삭제</button>`;
  if(item.tier==="user")acts+=`<button class="action-btn" onclick="editU('${item.id}',event)">✏</button><button class="action-btn" onclick="delU('${item.id}',event)" style="color:var(--c-red)">🗑</button>`;
  const th=item.url?`<a href="${item.url}" target="_blank">${item.title}</a>`:item.title;
  return `<div class="card tier-${item.tier}" data-tier="${item.tier}" data-new="${isN}" data-urgent="${isU}" data-status="${status}">
<div class="tier-marker"></div>
<div class="card-body">
<div class="card-title">${th}</div>
<div class="card-meta">${b}</div>
<div class="card-agency">${item.agency||""}</div>
${item.note?`<div class="card-note">${item.note}</div>`:""}
</div>
${acts?`<div class="card-actions">${acts}</div>`:""}
</div>`;
}

function sec(t,arr,s){
  if(!arr.length)return"";
  return`<div class="section-title">${t} (${arr.length}건)</div>`+arr.map(i=>card(i,s.statuses[i.id])).join("");
}

function render(){
  const s=ls();
  const all=[...DATA.map(i=>({...i,_st:s.statuses[i.id]?.status||"pool"})),...(s.userItems||[]).map(i=>({...i,tier:"user",_st:s.statuses[i.id]?.status||"pool"}))];
  all.sort((a,b)=>{if(!a.deadline&&!b.deadline)return 0;if(!a.deadline)return 1;if(!b.deadline)return -1;return a.deadline.localeCompare(b.deadline);});
  const f=CF;
  const vis=all.filter(i=>{
    const n=dn(i.deadline);
    if(f==="all")return true;
    if(f==="green")return i.tier==="green";
    if(f==="yellow")return i.tier==="yellow";
    if(f==="orange")return i.tier==="orange";
    if(f==="user")return i.tier==="user";
    if(f==="new")return i.first_seen===TODAY;
    if(f==="urgent")return n!==null&&n>=0&&n<=3;
    if(f==="progress")return i._st==="in_progress";
    if(f==="done")return i._st==="completed";
    return true;
  });
  document.getElementById("st-progress").textContent=all.filter(i=>i._st==="in_progress").length;
  document.getElementById("st-done").textContent=all.filter(i=>i._st==="completed").length;
  let html="";
  if(f==="all"){
    const newI=vis.filter(i=>i.first_seen===TODAY);
    const urg=vis.filter(i=>{const n=dn(i.deadline);return n!==null&&n>=0&&n<=3;});
    const usr=vis.filter(i=>i.tier==="user");
    const gr=vis.filter(i=>i.tier==="green");
    const ye=vis.filter(i=>i.tier==="yellow");
    const or=vis.filter(i=>i.tier==="orange");
    html=sec("🆕 오늘 신규",newI,s)+sec("⏰ 임박 마감 D-0~D-3",urg,s)+sec("◆ 내 사업",usr,s)+sec("● 1순위 강력 추천",gr,s)+sec("◐ 2순위 검토 추천",ye,s)+sec("○ 3순위 AI 포지셔닝",or,s);
  }else{
    html=vis.map(i=>card(i,s.statuses[i.id])).join("");
    if(!html)html='<div style="padding:20px;color:var(--muted);font-family:var(--mono);font-size:12px">해당 항목 없음</div>';
  }
  document.getElementById("grid").innerHTML=html;
}

function mv(id,ns,e){e.stopPropagation();const s=ls(),item=DATA.find(i=>i.id===id)||(s.userItems||[]).find(i=>i.id===id);if(!item)return;if(ns==="pool")delete s.statuses[id];else s.statuses[id]={status:ns,snapshot:item,moved_at:TODAY};ss(s);render();}
function delC(id,e){e.stopPropagation();if(!confirm("삭제하시겠습니까?"))return;const s=ls();delete s.statuses[id];ss(s);render();}

function openUserModal(){document.getElementById("meid").value="";document.getElementById("mtitle").textContent="내 사업 추가";["title","agency","deadline","url","note"].forEach(k=>document.getElementById("mtxt-"+k).value="");document.getElementById("mtxt-tier").value="green";document.getElementById("moverlay").classList.add("open");}
function editU(id,e){e.stopPropagation();const s=ls(),item=(s.userItems||[]).find(i=>i.id===id);if(!item)return;document.getElementById("meid").value=id;document.getElementById("mtitle").textContent="내 사업 편집";document.getElementById("mtxt-title").value=item.title||"";document.getElementById("mtxt-agency").value=item.agency||"";document.getElementById("mtxt-deadline").value=item.deadline||"";document.getElementById("mtxt-url").value=item.url||"";document.getElementById("mtxt-tier").value=item.tier||"green";document.getElementById("mtxt-note").value=item.note||"";document.getElementById("moverlay").classList.add("open");}
function saveUser(){const s=ls(),eid=document.getElementById("meid").value,ni={id:eid||"user_"+Date.now(),title:document.getElementById("mtxt-title").value.trim(),agency:document.getElementById("mtxt-agency").value.trim(),deadline:document.getElementById("mtxt-deadline").value.trim(),url:document.getElementById("mtxt-url").value.trim(),tier:document.getElementById("mtxt-tier").value,note:document.getElementById("mtxt-note").value.trim(),first_seen:TODAY,source:"user"};if(!ni.title){alert("제목 필수");return;}if(!s.userItems)s.userItems=[];if(eid){const idx=s.userItems.findIndex(i=>i.id===eid);if(idx>=0)s.userItems[idx]=ni;}else{s.userItems.push(ni);}ss(s);closeModal();render();}
function delU(id,e){e.stopPropagation();if(!confirm("삭제?"))return;const s=ls();s.userItems=(s.userItems||[]).filter(i=>i.id!==id);delete s.statuses[id];ss(s);render();}
function closeModal(){document.getElementById("moverlay").classList.remove("open");}
document.getElementById("moverlay").addEventListener("click",function(e){if(e.target===this)closeModal();});

render();
</script>

</body></html>
