name: Daily K-Startup Update

on:
  schedule:
    # 평일(월~금) KST 09:00 + 18:00 (UTC 00:00, 09:00)
    # 토·일은 K-Startup 신규 공고 미갱신 → 제외
    - cron: '0 0,9 * * 1-5'
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'pool 전체 deep_summary 강제 재생성 (백필용, 비용 ~$0.3)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      skip_crawl:
        description: '크롤 스킵 (pool 재분류 + Haiku만 실행)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 anthropic

      - name: Run update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_REGEN: ${{ github.event.inputs.force_regenerate }}
          SKIP_CRAWL: ${{ github.event.inputs.skip_crawl }}
        run: |
          ARGS=""
          if [ "$FORCE_REGEN" = "true" ]; then ARGS="$ARGS --force-regenerate"; fi
          if [ "$SKIP_CRAWL" = "true" ]; then ARGS="$ARGS --skip-crawl"; fi
          echo "Running: python update.py $ARGS"
          python update.py $ARGS

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recommendations.json
          # pool 변경이 없으면 skip
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "auto: $(date -u +%Y-%m-%d) 공고 업데이트"
          # 실행 중 main이 이동했을 수 있으므로 rebase 후 재시도 (최대 3회)
          for i in 1 2 3; do
            git pull --rebase origin main || true
            if git push; then
              echo "push succeeded on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed, retrying..."
            sleep 5
          done
          echo "push failed after 3 attempts"
          exit 1
