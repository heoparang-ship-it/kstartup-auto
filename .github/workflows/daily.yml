name: Daily K-Startup Update

on:
  schedule:
    # 평일(월~금) KST 09:00 + 18:00 (UTC 00:00, 09:00)
    # 토·일은 K-Startup 신규 공고 미갱신 → 제외
    - cron: '0 0,9 * * 1-5'
  workflow_dispatch:
    inputs:
      skip_crawl:
        description: '크롤 스킵 (pool 재분류 + 원문 fetch만 실행)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run update
        env:
          SKIP_CRAWL: ${{ github.event.inputs.skip_crawl }}
        run: |
          ARGS=""
          if [ "$SKIP_CRAWL" = "true" ]; then ARGS="$ARGS --skip-crawl"; fi
          echo "Running: python update.py $ARGS"
          python update.py $ARGS

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recommendations.json
          git diff --cached --quiet || git commit -m "auto: $(date -u +%Y-%m-%d) 공고 업데이트"
          git push
