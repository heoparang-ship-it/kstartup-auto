name: Daily K-Startup Update

# v10.0 Launch (2026-04-24): cron 일시 중단.
# v9 update.py + classify.py 가 v10 schema 를 덮어쓰는 걸 막기 위해 manual dispatch 전용.
# TODO: update.py 를 classify_v10 + gen_dashboards_v10 + BIZINFO/KOCCA 멀티소스로 포팅한 뒤 cron 재활성.
on:
  # schedule:
  #   - cron: '0 0,9 * * 1-5'
  workflow_dispatch:
    inputs:
      skip_crawl:
        description: '크롤 스킵 (pool 재분류 + 원문 fetch만 실행)'
        required: false
        default: 'true'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run update
        env:
          SKIP_CRAWL: ${{ github.event.inputs.skip_crawl }}
        run: |
          ARGS=""
          if [ "$SKIP_CRAWL" = "true" ]; then ARGS="$ARGS --skip-crawl"; fi
          echo "Running: python update.py $ARGS"
          python update.py $ARGS
      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recommendations.json
          git diff --cached --quiet || git commit -m "auto: $(date -u +%Y-%m-%d) 공고 업데이트"
          git push
