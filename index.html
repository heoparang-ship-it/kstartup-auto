<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Startup 추천 대시보드 — 신혼생활</title>
<style>
  :root{--bg:#fff;--fg:#000;--muted:#666;--line:#000;--line-soft:#e5e5e5;--hover:#f5f5f5;--soft-bg:#fafafa}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",sans-serif;background:var(--bg);color:var(--fg);line-height:1.55;-webkit-font-smoothing:antialiased}
  .container{max-width:1100px;margin:0 auto;padding:48px 24px 80px}
  header{border-bottom:2px solid var(--line);padding-bottom:24px;margin-bottom:32px}
  h1{margin:0 0 6px;font-size:32px;font-weight:800;letter-spacing:-0.02em}
  .meta{color:var(--muted);font-size:13px}.meta strong{color:var(--fg);font-weight:600}
  .stats{display:grid;grid-template-columns:repeat(6,1fr);margin:24px 0 0;border:1px solid var(--line)}
  .stat{padding:14px 10px;border-right:1px solid var(--line);text-align:center}
  .stat:last-child{border-right:none}
  .stat .num{font-size:22px;font-weight:800}.stat .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;font-weight:600}
  .filters{display:flex;gap:6px;flex-wrap:wrap;margin:28px 0 0}
  .filter-btn{background:var(--bg);border:1px solid var(--line);color:var(--fg);padding:7px 14px;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;transition:background 0.1s}
  .filter-btn:hover{background:var(--hover)}.filter-btn.active{background:var(--fg);color:var(--bg)}
  .filter-btn .cnt{font-family:"SF Mono",Menlo,monospace;font-size:10px;opacity:0.7;margin-left:4px}
  section{margin-top:36px}
  h2{font-size:14px;margin:0 0 16px;padding-bottom:10px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:0.1em;font-weight:700}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:0;border-top:1px solid var(--line);border-left:1px solid var(--line)}
  .card{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:18px 20px 16px;display:flex;flex-direction:column;gap:10px;position:relative;background:var(--bg);transition:background 0.1s}
  .card:hover{background:var(--hover)}
  .card-tier{position:absolute;top:0;left:0;width:4px;height:100%;background:var(--fg)}
  .card.tier-yellow .card-tier{background:repeating-linear-gradient(45deg,var(--fg),var(--fg) 3px,var(--bg) 3px,var(--bg) 6px)}
  .card.tier-orange .card-tier{background:repeating-linear-gradient(0deg,var(--fg),var(--fg) 6px,var(--bg) 6px,var(--bg) 9px)}
  .card-title{font-weight:700;font-size:15px;line-height:1.35}
  .card-title a{color:var(--fg);text-decoration:none;background-image:linear-gradient(var(--fg),var(--fg));background-position:0 100%;background-repeat:no-repeat;background-size:0 1px;transition:background-size 0.2s}
  .card-title a:hover{background-size:100% 1px}
  .card-meta{display:flex;flex-wrap:wrap;gap:6px;font-size:11px}
  .badge{display:inline-block;padding:2px 8px;border:1px solid var(--line);font-weight:600;font-family:"SF Mono",Menlo,monospace;text-transform:uppercase;letter-spacing:0.04em}
  .badge.solid{background:var(--fg);color:var(--bg)}
  .badge.urgent{background:var(--fg);color:var(--bg)}
  .card-agency{font-size:11px;color:var(--muted);font-family:"SF Mono",Menlo,monospace}
  .card-note{font-size:13px;color:var(--fg);border-top:1px dashed var(--line-soft);padding-top:10px;margin-top:2px}
  .card-connect{font-size:12.5px;background:var(--soft-bg);border-left:2px solid var(--fg);padding:8px 10px}
  .card-connect .tag{font-family:"SF Mono",Menlo,monospace;font-size:10px;font-weight:700;letter-spacing:0.08em;margin-right:6px;text-transform:uppercase}
  .empty{border:1px dashed var(--line);padding:32px;text-align:center;color:var(--muted);font-size:13px}
  .loading{text-align:center;padding:60px;color:var(--muted);font-size:14px}
  footer{margin-top:60px;padding-top:20px;border-top:1px solid var(--line);color:var(--muted);font-size:11px;font-family:"SF Mono",Menlo,monospace;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  footer a{color:var(--fg);text-decoration:underline}
  @media(max-width:640px){.container{padding:24px 16px 60px}h1{font-size:24px}.stats{grid-template-columns:repeat(3,1fr)}.stat{border-bottom:1px solid var(--line)}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>K-Startup 추천 대시보드</h1>
    <div class="meta">
      마지막 갱신 <strong id="last-updated">—</strong> · 신혼생활(sinhon.life) · 소재지 <strong>인천</strong>
    </div>
    <div class="stats" id="stats-bar"></div>
    <div class="filters" id="filters"></div>
  </header>
  <section>
    <h2 id="section-title">전체 공고</h2>
    <div id="card-grid" class="loading">데이터 로딩 중...</div>
  </section>
  <footer>
    <div>kstartup-auto v3 · GitHub Actions 매일 자동 갱신</div>
    <div><a href="recommendations.json">raw data</a></div>
  </footer>
</div>
<script>
const KSTD = new Date().toLocaleDateString('sv-SE', {timeZone:'Asia/Seoul'});

let DATA = [];
let currentFilter = 'all';

async function init() {
  try {
    const r = await fetch('recommendations.json');
    const pool = await r.json();
    DATA = pool.items || [];
    document.getElementById('last-updated').textContent = pool.last_updated || '—';
    render('all');
  } catch(e) {
    document.getElementById('card-grid').innerHTML = '<div class="empty">recommendations.json 로드 실패</div>';
  }
}

function daysUntil(dl) {
  if (!dl) return 999;
  const d1 = new Date(KSTD+'T00:00:00+09:00');
  const d2 = new Date(dl+'T00:00:00+09:00');
  return Math.round((d2-d1)/86400000);
}
function dLabel(d) {
  if (d<0) return `D+${-d}`;
  if (d===0) return 'D-DAY';
  return `D-${d}`;
}
function tierLabel(t) {
  return {green:'● 1순위', yellow:'◐ 2순위', orange:'○ AI'}[t] || t;
}

function render(filter) {
  currentFilter = filter;
  const greens = DATA.filter(i=>i.tier==='green');
  const yellows = DATA.filter(i=>i.tier==='yellow');
  const oranges = DATA.filter(i=>i.tier==='orange');
  const newToday = DATA.filter(i=>i.first_seen===KSTD);
  const urgent = DATA.filter(i=>{const d=daysUntil(i.deadline);return d>=0&&d<=3;});

  // Stats
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="num">${DATA.length}</div><div class="label">Total</div></div>
    <div class="stat"><div class="num">${greens.length}</div><div class="label">● 1순위</div></div>
    <div class="stat"><div class="num">${yellows.length}</div><div class="label">◐ 2순위</div></div>
    <div class="stat"><div class="num">${oranges.length}</div><div class="label">○ AI</div></div>
    <div class="stat"><div class="num">${newToday.length}</div><div class="label">NEW</div></div>
    <div class="stat"><div class="num">${urgent.length}</div><div class="label">⏰ 임박</div></div>`;

  // Filters
  const counts = {all:DATA.length, green:greens.length, yellow:yellows.length, orange:oranges.length, 'new':newToday.length, urgent:urgent.length};
  const btns = [['all','전체'],['green','● 1순위'],['yellow','◐ 2순위'],['orange','○ AI'],['new','NEW'],['urgent','⏰ D-3']];
  document.getElementById('filters').innerHTML = btns.map(([k,l])=>
    `<button class="filter-btn ${k===filter?'active':''}" onclick="render('${k}')">${l} <span class="cnt">${counts[k]}</span></button>`
  ).join('');

  // Filter items
  let list = DATA;
  if (filter==='green'||filter==='yellow'||filter==='orange') list=DATA.filter(i=>i.tier===filter);
  else if (filter==='new') list=newToday;
  else if (filter==='urgent') list=urgent;

  list = [...list].sort((a,b)=>(a.deadline||'9999').localeCompare(b.deadline||'9999'));

  const titles = {all:'전체 공고',green:'● 1순위 강력 추천',yellow:'◐ 2순위 검토',orange:'○ AI 포지셔닝','new':'NEW 오늘 신규',urgent:'⏰ 임박 마감'};
  document.getElementById('section-title').textContent = titles[filter]||'전체 공고';

  const grid = document.getElementById('card-grid');
  grid.className = 'grid';
  if (!list.length) { grid.innerHTML='<div class="empty">해당 조건의 공고가 없습니다.</div>'; grid.className=''; return; }

  grid.innerHTML = list.map(it => {
    const d = daysUntil(it.deadline);
    const urg = d>=0 && d<=3;
    const isNew = it.first_seen === KSTD;
    const url = it.url || (it.pbancSn ? `https://www.k-startup.go.kr/web/contents/bizpbanc-ongoing.do?schM=view&pbancSn=${it.pbancSn}` : '');
    const titleHtml = url ? `<a href="${url}" target="_blank">${esc(it.title)}</a>` : esc(it.title);
    const dlText = it.deadline ? `${it.deadline} · ${dLabel(d)}` : '마감일 미확인';

    return `<div class="card tier-${it.tier||'yellow'}">
      <div class="card-tier"></div>
      <div class="card-title">${titleHtml}</div>
      <div class="card-meta">
        <span class="badge solid">${tierLabel(it.tier)}</span>
        <span class="badge ${urg?'urgent':''}">${dlText}</span>
        ${isNew?'<span class="badge">NEW</span>':''}
      </div>
      ${it.agency?`<div class="card-agency">${esc(it.agency)}</div>`:''}
      ${it.note?`<div class="card-note">${esc(it.note)}</div>`:''}
      ${it.connect?`<div class="card-connect"><span class="tag">▸ 연결</span>${esc(it.connect)}</div>`:''}
    </div>`;
  }).join('');
}

function esc(s) { if(!s)return''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

init();
</script>
</body>
</html>
